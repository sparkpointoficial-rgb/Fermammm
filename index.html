<!DOCTYPE html>
<html>
<head>
<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

.rig{
display:flex;
justify-content:center;
margin-top:100px;
gap:20px;
}

.gpu{
width:120px;
height:60px;
background:#222;
border-radius:10px;
position:relative;
box-shadow:0 0 10px #00ff9d;
}

.fan{
width:30px;
height:30px;
border:4px solid #555;
border-top:4px solid #00ff9d;
border-radius:50%;
position:absolute;
top:15px;
left:45px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.led{
width:6px;
height:6px;
background:#00ff9d;
border-radius:50%;
position:absolute;
right:10px;
top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

</style>
</head>

<body>

<h1>My Mining Farm</h1>

<div class="rig">

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

</div>

</body>
</html>
