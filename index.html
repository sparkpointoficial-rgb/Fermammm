<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CriptoCapital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#020617,#020c1b,#020617);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#020617;
box-shadow:0 0 20px #00ff9d22;
}

.logo{
font-size:26px;
font-weight:bold;
color:#00ff9d;
}

.connect{
background:#00ff9d;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.dashboard{
display:flex;
gap:20px;
padding:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#071426;
padding:20px;
border-radius:15px;
width:160px;
text-align:center;
box-shadow:0 0 15px #00ff9d33;
}

.card h3{
margin:0;
font-size:16px;
color:#aaa;
}

.value{
font-size:24px;
color:#00ff9d;
margin-top:5px;
}

.farm{
margin-top:30px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.gpu{
width:170px;
height:90px;
background:#0b1c33;
border-radius:15px;
position:relative;
box-shadow:0 0 20px #00ff9d55;
}

.fan{
width:38px;
height:38px;
border:4px solid #555;
border-top:4px solid #00ff9d;
border-radius:50%;
position:absolute;
top:25px;
left:65px;
animation:spin 0.7s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.led{
width:8px;
height:8px;
background:#00ff9d;
border-radius:50%;
position:absolute;
right:12px;
top:12px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

.actions{
text-align:center;
margin-top:30px;
}

button.action{
background:#00ff9d;
border:none;
padding:12px 25px;
border-radius:10px;
margin:10px;
font-weight:bold;
cursor:pointer;
}

.ref{
text-align:center;
margin-top:30px;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<header>

<div class="logo">CriptoCapital</div>

<button class="connect" onclick="connectWallet()">Connect Wallet</button>

</header>

<div class="dashboard">

<div class="card">
<h3>Balance</h3>
<div class="value" id="balance">0 BNB</div>
</div>

<div class="card">
<h3>GPU</h3>
<div class="value" id="gpuCount">0</div>
</div>

<div class="card">
<h3>Hashrate</h3>
<div class="value" id="hashrate">0 MH/s</div>
</div>

<div class="card">
<h3>Income/hour</h3>
<div class="value" id="income">0</div>
</div>

</div>

<div class="farm" id="farm"></div>

<div class="actions">

<button class="action" onclick="buyGPU()">Buy GPU (0.01 BNB)</button>

<button class="action" onclick="upgradeGPU()">Upgrade GPU</button>

<button class="action" onclick="withdraw()">Withdraw</button>

</div>

<div class="ref">
Referral link:<br>
<span id="refLink">connect wallet</span>
</div>

<script>

let web3;
let account;

let gpuCount = 0;

function renderFarm(){

const farm = document.getElementById("farm");

farm.innerHTML="";

for(let i=0;i<gpuCount;i++){

farm.innerHTML += `
<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>
`;

}

}

async function connectWallet(){

if(window.ethereum){

web3 = new Web3(window.ethereum);

await window.ethereum.request({
method:'eth_requestAccounts'
});

const accounts = await web3.eth.getAccounts();

account = accounts[0];

document.getElementById("refLink").innerText =
window.location.href+"?ref="+account;

}

}

function buyGPU(){

gpuCount++;

document.getElementById("gpuCount").innerText=gpuCount;

document.getElementById("hashrate").innerText =
gpuCount*60+" MH/s";

document.getElementById("income").innerText =
(gpuCount*0.0002).toFixed(5)+" BNB";

renderFarm();

}

function upgradeGPU(){

alert("GPU upgraded");

}

function withdraw(){

alert("Withdraw from smart contract");

}

</script>

</body>
</html>
