<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Mining Farm</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>

<style>

body{
background:#020b1c;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#00ffa6;
color:#000;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.rig{
display:flex;
justify-content:center;
gap:20px;
margin-top:50px;
}

.gpu{
width:120px;
height:60px;
background:#0f1f2e;
border-radius:12px;
box-shadow:0 0 15px #00ffa6;
position:relative;
}

.fan{
width:28px;
height:28px;
border:4px solid #555;
border-top:4px solid #00ffa6;
border-radius:50%;
position:absolute;
top:16px;
left:46px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.led{
width:6px;
height:6px;
background:#00ffa6;
border-radius:50%;
position:absolute;
right:10px;
top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

.wallet{
margin-top:20px;
font-size:14px;
}

</style>
</head>

<body>

<h1>My Mining Farm</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<div class="wallet" id="wallet">Wallet: not connected</div>

<div class="rig">

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

<div class="gpu">
<div class="fan"></div>
<div class="led"></div>
</div>

</div>

<button onclick="buyGPU()">Buy GPU (0.01 BNB)</button>

<script>

let web3;
let account;

const contractAddress = "PASTE_CONTRACT_ADDRESS";

const contractABI = [
{
"inputs":[],
"name":"buyGPU",
"outputs":[],
"stateMutability":"payable",
"type":"function"
}
];

async function connectWallet(){

if(window.ethereum){

web3 = new Web3(window.ethereum);

await window.ethereum.request({
method:'eth_requestAccounts'
});

const accounts = await web3.eth.getAccounts();

account = accounts[0];

document.getElementById("wallet").innerText =
"Wallet: "+account;

}else{

alert("Install MetaMask");

}

}

async function buyGPU(){

const contract = new web3.eth.Contract(
contractABI,
contractAddress
);

await contract.methods.buyGPU().send({

from:account,

value:web3.utils.toWei("0.01","ether")

});

alert("GPU purchased");

}

</script>

</body>
</html>
